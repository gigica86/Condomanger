<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>CondoManager Pro v5.7</title>
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>

    <style>
        :root { --p: #0f172a; --a: #2563eb; --b: #e2e8f0; --s: #166534; --d: #b91c1c; --t: #334155; }
        body { font-family: "Inter", sans-serif; background: #f1f5f9; color: var(--t); margin: 0; font-size: 13px; }
        header { background: var(--p); color: white; padding: 12px 16px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; }
        .container { max-width: 1200px; margin: 12px auto; padding: 0 12px; }
        .summary-bar { display: flex; gap: 10px; margin-bottom: 15px; }
        .summary-card { flex: 1; background: white; padding: 12px; border: 1px solid var(--b); border-radius: 8px; }
        .main-grid { display: grid; grid-template-columns: 300px 1fr; gap: 15px; }
        @media (max-width: 900px) { .main-grid { grid-template-columns: 1fr; } }
        .panel { background: white; border: 1px solid var(--b); border-radius: 8px; overflow: hidden; margin-bottom: 15px; }
        .panel-header { background: #f8fafc; padding: 10px 14px; border-bottom: 1px solid var(--b); font-weight: 700; font-size: 11px; color: #64748b; }
        .panel-body { padding: 15px; }
        input, select { width: 100%; padding: 10px; border: 1px solid var(--b); border-radius: 6px; margin-bottom: 12px; font-size: 14px; box-sizing: border-box; background: #fff; }
        .btn { padding: 10px 15px; border-radius: 6px; border: none; cursor: pointer; font-weight: 600; font-size: 12px; width: 100%; }
        .btn-blue { background: var(--a); color: white; }
        .btn-gray { background: #f1f5f9; color: #475569; border: 1px solid var(--b); }
        .btn-red { background: var(--d); color: white; }
        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; background: #f8fafc; padding: 10px; border-bottom: 2px solid var(--b); font-size: 11px; }
        td { padding: 10px; border-bottom: 1px solid #f1f5f9; }
        .del-btn { color: var(--d); cursor: pointer; font-weight: bold; border: 1px solid var(--d); border-radius: 4px; padding: 2px 6px; font-size: 10px; }
        .modal { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.5); z-index:2000; padding:20px; align-items: center; justify-content: center; backdrop-filter: blur(4px); }
        .modal-content { background: white; width: 100%; max-width: 450px; border-radius: 12px; padding: 24px; }
    </style>
</head>
<body>

<header>
    <div style="font-weight: 800; font-size: 15px;">CONDOMANAGER PRO</div>
    <div style="display:flex; gap:10px;">
        <div style="background:rgba(255,255,255,0.1); padding:5px 10px; border-radius:5px; cursor:pointer;" onclick="toggleModal('modalEsercizio')">
            <span id="label-anno">---</span> ▾
        </div>
        <button class="btn btn-gray" style="width:auto;" onclick="toggleModal('archiveModal')">STORICO</button>
        <button class="btn btn-gray" style="width:auto;" onclick="toggleModal('settingsModal')">⚙️</button>
    </div>
</header>

<div class="container">
    <div class="summary-bar">
        <div class="summary-card"><small>USCITE</small><b id="st-uscite">0,00 €</b></div>
        <div class="summary-card"><small>FONDO</small><b id="st-fondo" style="color:var(--s)">0,00 €</b></div>
        <div class="summary-card"><small>CASSA</small><b id="st-liquidita">0,00 €</b></div>
    </div>

    <div class="main-grid">
        <div class="panel">
            <div class="panel-header">REGISTRA MOVIMENTI</div>
            <div class="panel-body">
                <input type="date" id="f-data">
                <input type="text" id="f-desc" placeholder="Causale uscita">
                <input type="number" id="f-imp" placeholder="Importo €">
                <button class="btn btn-blue" onclick="salvaMovimento('USCITA')">Salva Uscita</button>
                <hr style="margin:15px 0; border:0; border-top:1px solid var(--b);">
                <select id="f-condo"><option value="">Caricamento...</option></select>
                <select id="f-cau">
                    <option value="Rata Condominiale">Rata Condominiale</option>
                    <option value="Fondo Cassa">Fondo Cassa</option>
                </select>
                <input type="number" id="f-vimp" placeholder="Importo €">
                <button class="btn btn-blue" style="background:var(--s);" onclick="salvaMovimento('ENTRATA')">Salva Entrata</button>
            </div>
        </div>

        <div>
            <div class="panel">
                <div class="panel-header" style="display:flex; justify-content:space-between;">SITUAZIONE ATTUALE <button onclick="stampaBilancio()" style="font-size:10px; cursor:pointer;">PDF</button></div>
                <div style="overflow-x:auto;">
                    <table>
                        <thead><tr><th>NOME</th><th>QUOTA</th><th>VERSATO</th><th>SALDO</th></tr></thead>
                        <tbody id="main-table-body"></tbody>
                    </table>
                </div>
            </div>

            <div class="panel">
                <div class="panel-header">REGISTRO ANALITICO (CANCELLAZIONE)</div>
                <div style="max-height: 400px; overflow-y: auto;">
                    <table>
                        <thead><tr><th>DATA</th><th>DETTAGLIO</th><th>IMP.</th><th>AZIONE</th></tr></thead>
                        <tbody id="reg-table-body"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- MODALI -->
<div id="modalEsercizio" class="modal"><div class="modal-content">
    <h4>Gestione Anno</h4>
    <input type="number" id="input-edit-anno">
    <button class="btn btn-blue" onclick="aggiornaAnno()">Salva Anno</button>
    <hr style="margin:20px 0;"><button class="btn btn-red" onclick="proceduraChiusura()">🔒 Archivia Bilancio</button>
    <button class="btn btn-gray" style="margin-top:10px;" onclick="toggleModal('modalEsercizio')">Annulla</button>
</div></div>

<div id="settingsModal" class="modal"><div class="modal-content">
    <h4>Anagrafica</h4>
    <div style="display:flex; gap:5px; margin-bottom:10px;"><input type="text" id="c-nome" placeholder="Nome"><input type="number" id="c-mill" placeholder="Mill."><button class="btn btn-blue" style="width:auto" onclick="salvaCondomino()">+</button></div>
    <div id="lista-condo" style="max-height:200px; overflow-y:auto; border:1px solid #eee;"></div>
    <button class="btn btn-gray" style="margin-top:15px;" onclick="toggleModal('settingsModal')">Chiudi</button>
</div></div>

<div id="archiveModal" class="modal"><div class="modal-content">
    <h4>Archivio Storico</h4>
    <div id="lista-archivi"></div>
    <button class="btn btn-gray" style="margin-top:15px;" onclick="toggleModal('archiveModal')">Chiudi</button>
</div></div>

<script>
    const firebaseConfig = {
      apiKey: "AIzaSyBCHjSOjZmN6Fcj-Pju4AM5Yx2edIuDwJo",
      authDomain: "condomanager-86dac.firebaseapp.com",
      projectId: "condomanager-86dac",
      storageBucket: "condomanager-86dac.firebasestorage.app",
      messagingSenderId: "582217098715",
      appId: "1:582217098715:web:c18804916c776cb48e73fe"
    };

    firebase.initializeApp(firebaseConfig);
    const fs = firebase.firestore();
    let state = { anno: 2024, condomini: [], spese: [], versamenti: [] };

    function initApp() {
        fs.collection("gestione").doc("corrente").onSnapshot(doc => {
            if (doc.exists) { state = doc.data(); renderUI(); }
        });
        loadArchivio();
    }

    function renderUI() {
        document.getElementById('label-anno').innerText = "Esercizio " + state.anno;
        document.getElementById('input-edit-anno').value = state.anno;
        const totS = state.spese.reduce((a,b) => a + Number(b.imp), 0);
        const totF = state.versamenti.filter(v => v.cau === "Fondo Cassa").reduce((a,b) => a + Number(b.imp), 0);
        const totV = state.versamenti.reduce((a,b) => a + Number(b.imp), 0);

        document.getElementById('st-uscite').innerText = totS.toFixed(2) + " €";
        document.getElementById('st-fondo').innerText = totF.toFixed(2) + " €";
        document.getElementById('st-liquidita').innerText = (totV - totS).toFixed(2) + " €";

        document.getElementById('f-condo').innerHTML = '<option value="">Scegli...</option>' + 
            state.condomini.map((c, i) => `<option value="${i}">${c.nome}</option>`).join('');

        const tbody = document.getElementById('main-table-body');
        tbody.innerHTML = state.condomini.map((c, i) => {
            const q = (totS * c.mill) / 1000;
            const v = state.versamenti.filter(x => parseInt(x.id) === i && x.cau === "Rata Condominiale").reduce((a,b) => a + Number(b.imp), 0);
            return `<tr><td><b>${c.nome}</b></td><td>${q.toFixed(2)}€</td><td>${v.toFixed(2)}€</td><td style="color:${v-q>=0?'green':'red'}"><b>${(v-q).toFixed(2)}€</b></td></tr>`;
        }).join('');

        const regBody = document.getElementById('reg-table-body');
        let html = "";
        state.spese.forEach((s, idx) => {
            html += `<tr><td>${s.data}</td><td>${s.desc}</td><td style="color:red">-${s.imp}€</td><td><span class="del-btn" onclick="cancellaVoce('SPESA', ${idx})">CANCELLA</span></td></tr>`;
        });
        state.versamenti.forEach((v, idx) => {
            html += `<tr><td>${v.data}</td><td>${state.condomini[v.id]?.nome || 'Condomino'} (${v.cau})</td><td style="color:green">+${v.imp}€</td><td><span class="del-btn" onclick="cancellaVoce('VERS', ${idx})">CANCELLA</span></td></tr>`;
        });
        regBody.innerHTML = html;

        document.getElementById('lista-condo').innerHTML = state.condomini.map((c, i) => `
            <div style="display:flex; justify-content:space-between; padding:8px; border-bottom:1px solid #eee;">
                <span>${c.nome}</span> <span class="del-btn" onclick="cancellaVoce('CONDO', ${i})">X</span>
            </div>`).join('');
    }

    async function salvaMovimento(tipo) {
        if(tipo === 'USCITA') {
            const d = document.getElementById('f-desc').value, i = parseFloat(document.getElementById('f-imp').value), dt = document.getElementById('f-data').value;
            if(!d || isNaN(i) || !dt) return alert("Compila tutti i campi");
            state.spese.push({ desc: d, imp: i, data: dt });
            document.getElementById('f-desc').value = ""; document.getElementById('f-imp').value = "";
        } else {
            const id = document.getElementById('f-condo').value, i = parseFloat(document.getElementById('f-vimp').value), cau = document.getElementById('f-cau').value;
            if(id === "" || isNaN(i)) return alert("Dati mancanti");
            state.versamenti.push({ id, imp: i, cau, data: new Date().toISOString().split('T')[0] });
            document.getElementById('f-vimp').value = "";
        }
        await fs.collection("gestione").doc("corrente").set(state);
    }

    async function cancellaVoce(tipo, idx) {
        if(!confirm("Vuoi eliminare definitivamente questa voce?")) return;
        if(tipo === 'SPESA') state.spese.splice(idx, 1);
        if(tipo === 'VERS') state.versamenti.splice(idx, 1);
        if(tipo === 'CONDO') state.condomini.splice(idx, 1);
        await fs.collection("gestione").doc("corrente").set(state);
    }

    async function cancellaArchivio(docId) {
        if(!confirm("Cancellare definitivamente questo archivio?")) return;
        await fs.collection("archivio").doc(docId).delete();
    }

    async function salvaCondomino() {
        const n = document.getElementById('c-nome').value, m = parseFloat(document.getElementById('c-mill').value);
        if(!n || isNaN(m)) return alert("Dati mancanti");
        state.condomini.push({ nome: n, mill: m });
        await fs.collection("gestione").doc("corrente").set(state);
        document.getElementById('c-nome').value = ""; document.getElementById('c-mill').value = "";
    }

    async function aggiornaAnno() {
        state.anno = parseInt(document.getElementById('input-edit-anno').value);
        await fs.collection("gestione").doc("corrente").set(state);
        toggleModal('modalEsercizio');
    }

    async function proceduraChiusura() {
        if(!confirm("Archiviare l'anno corrente?")) return;
        await fs.collection("archivio").doc("anno_" + state.anno).set(state);
        const f = state.versamenti.filter(v => v.cau === "Fondo Cassa");
        state.anno++; state.spese = []; state.versamenti = f;
        await fs.collection("gestione").doc("corrente").set(state);
        toggleModal('modalEsercizio');
    }

    async function loadArchivio() {
        fs.collection("archivio").onSnapshot(snap => {
            const div = document.getElementById('lista-archivi');
            div.innerHTML = snap.empty ? "Nessun archivio." : snap.docs.map(doc => {
                const d = doc.data();
                return `<div style="display:flex; justify-content:space-between; padding:10px; border-bottom:1px solid #eee; align-items:center;">
                    <span><b>Anno ${d.anno}</b></span>
                    <div style="display:flex; gap:5px;">
                        <button class="btn btn-gray" style="width:auto" onclick='generaPDFStorico(${JSON.stringify(d)})'>PDF</button>
                        <button class="btn btn-red" style="width:auto; padding:5px 10px;" onclick="cancellaArchivio('${doc.id}')">ELIMINA</button>
                    </div>
                </div>`;
            }).join('');
        });
    }

    function toggleModal(id) {
        const m = document.getElementById(id);
        m.style.display = (m.style.display === 'flex') ? 'none' : 'flex';
    }

    function stampaBilancio() { generaPDFStorico(state); }

    function generaPDFStorico(data) {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        doc.setFontSize(18); doc.text("BILANCIO ANNO " + data.anno, 14, 20);
        doc.autoTable({ startY: 30, head: [['Data', 'Spesa', '€']], body: data.spese.map(s => [s.data, s.desc, s.imp.toFixed(2)]) });
        const totS = data.spese.reduce((a,b) => a + Number(b.imp), 0);
        doc.autoTable({ startY: doc.lastAutoTable.finalY + 15, head: [['Nome', 'Mill.', 'Quota', 'Saldo']], body: data.condomini.map((c, i) => {
            const q = (totS * c.mill)/1000;
            const v = data.versamenti.filter(x => parseInt(x.id) === i && x.cau === "Rata Condominiale").reduce((a,b) => a + Number(b.imp), 0);
            return [c.nome, c.mill, q.toFixed(2), (v-q).toFixed(2)];
        })});
        doc.save(`Bilancio_${data.anno}.pdf`);
    }

    document.getElementById('f-data').valueAsDate = new Date();
    initApp();
</script>
</body>
</html>
