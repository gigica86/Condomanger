<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>CondoElite v4.7 - PDF Professionale</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    
    <style>
        :root { 
            --bg: #f8fafc; --card: #ffffff; --text: #0f172a;
            --primary: #2563eb; --secondary: #64748b;
            --success: #10b981; --danger: #ef4444; --warning: #f59e0b;
            --shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
        }
        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
        body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg); margin: 0; color: var(--text); }
        header { background: #fff; padding: 10px 16px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #e2e8f0; position: sticky; top: 0; z-index: 1000; }
        .brand { font-weight: 800; font-size: 1.1rem; color: var(--primary); }
        .container { max-width: 1200px; margin: 15px auto; padding: 0 15px 50px 15px; }
        .card { background: var(--card); padding: 20px; border-radius: 16px; box-shadow: var(--shadow); margin-bottom: 20px; border: 1px solid #e2e8f0; }
        h4 { margin: 0 0 15px 0; font-size: 0.8rem; text-transform: uppercase; color: var(--secondary); letter-spacing: 0.05em; }
        .btn-main, .btn-outline { padding: 14px; border-radius: 12px; font-weight: 600; cursor: pointer; border: none; font-size: 0.95rem; display: flex; align-items: center; justify-content: center; gap: 8px; width: 100%; }
        .btn-main { background: var(--primary); color: white; }
        .btn-outline { background: #f1f5f9; color: var(--text); border: 1px solid #e2e8f0; }
        input, select { width: 100%; padding: 14px; border: 1px solid #cbd5e1; border-radius: 12px; margin-bottom: 12px; font-size: 16px; background: #fff; }
        .grid-2 { display: grid; grid-template-columns: 1fr; gap: 16px; }
        @media (min-width: 768px) { .grid-2 { grid-template-columns: 1fr 1fr; } }
        .table-wrapper { overflow-x: auto; border-radius: 8px; }
        table { width: 100%; border-collapse: collapse; min-width: 500px; }
        th { text-align: left; padding: 12px; background: #f8fafc; font-size: 0.8rem; color: var(--secondary); }
        td { padding: 12px; border-bottom: 1px solid #f1f5f9; font-size: 0.9rem; }
        .esercizio-trigger { background: #1e293b; color: white; padding: 8px 14px; border-radius: 10px; font-weight: bold; cursor: pointer; display: flex; align-items: center; gap: 6px; }
        .modal { display:none; position:fixed; z-index:3000; left:0; top:0; width:100%; height:100%; background:rgba(0,0,0,0.5); backdrop-filter: blur(4px); padding: 20px; }
        .modal-content { background: white; border-radius: 20px; max-width: 450px; margin: 10% auto; padding: 24px; }
        .stats-box { text-align: center; padding: 12px; border-radius: 14px; background: #fff; border: 1px solid #e2e8f0; }
        .stats-val { font-size: 1.2rem; font-weight: 800; color: var(--primary); }
    </style>
</head>
<body>

<header>
    <div class="brand">🏢 CondoElite</div>
    <div style="display:flex; align-items:center; gap:8px;">
        <div class="esercizio-trigger" onclick="toggleModal('esercizioModal')">
            <span id="header-anno">2024</span> ▾
        </div>
        <button class="btn-outline" style="width:40px; height:40px; padding:0;" onclick="toggleDropdown()">⚙️</button>
    </div>
</header>

<div id="settingsMenu" style="display:none; position:fixed; right:16px; top:65px; background:#fff; border-radius:16px; box-shadow:var(--shadow); width:180px; border:1px solid #e2e8f0; z-index:2000;">
    <div style="padding:8px;">
        <button class="btn-outline" style="border:none; justify-content:flex-start;" onclick="toggleModal('settingsModal')">👥 Condomini</button>
        <button class="btn-outline" style="border:none; justify-content:flex-start;" onclick="toggleModal('fullRegModal')">🔍 Registro</button>
        <button class="btn-outline" style="border:none; justify-content:flex-start;" onclick="toggleModal('archiveModal')">📜 Archivio</button>
        <hr style="border:0; border-top:1px solid #eee; margin:4px 0;">
        <button class="btn-outline" style="border:none; justify-content:flex-start;" onclick="exportBackup()">💾 Backup</button>
    </div>
</div>

<div class="container">
    <div style="display:grid; grid-template-columns: repeat(3, 1fr); gap:10px; margin-bottom:20px;">
        <div class="stats-box"><small>USCITE</small><div id="val-tot-riparto-header" class="stats-val">0</div></div>
        <div class="stats-box"><small>FONDO</small><div id="val-fondo-auto-header" class="stats-val" style="color:var(--success)">0</div></div>
        <div class="stats-box"><small>CASSA</small><div id="val-liquidita" class="stats-val" style="color:var(--warning)">0</div></div>
    </div>

    <div class="grid-2">
        <div class="card">
            <h4>💸 Nuova Uscita</h4>
            <input type="date" id="s-data">
            <input type="text" id="s-desc" placeholder="Descrizione spesa">
            <input type="number" id="s-imp" placeholder="Importo €">
            <button class="btn-main" onclick="addSpesa()">Registra Spesa</button>
        </div>
        <div class="card">
            <h4>💰 Nuova Entrata</h4>
            <select id="v-condomino"></select>
            <select id="v-causale">
                <option value="Rata Condominiale">Rata Condominiale</option>
                <option value="Fondo Cassa">Fondo Cassa</option>
            </select>
            <input type="number" id="v-imp" placeholder="Importo €">
            <button class="btn-main" style="background:var(--success)" onclick="addVersamento()">Versa Quota</button>
        </div>
    </div>

    <div class="card">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
            <h4>🏦 Situazione Millesimale</h4>
            <button class="btn-main" style="width:auto; padding:8px 16px; font-size:0.8rem;" onclick="generaBilancioPDFCompleto(db)">📄 Scarica Bilancio PDF</button>
        </div>
        <div class="table-wrapper">
            <table>
                <thead><tr><th>Nome</th><th>Quota</th><th>Versato</th><th>Saldo</th></tr></thead>
                <tbody id="tab-main"></tbody>
            </table>
        </div>
    </div>
</div>

<!-- MODALI -->
<div id="esercizioModal" class="modal"><div class="modal-content">
    <h3>📅 Esercizio <span id="modal-anno-titolo"></span></h3>
    <input type="number" id="input-anno">
    <button class="btn-main" style="margin-top:10px;" onclick="cambiaAnno()">Salva Anno</button>
    <hr style="margin:20px 0;">
    <button class="btn-main" style="background:var(--danger)" onclick="chiudiEsercizio()">💾 Archivia e Azzera</button>
    <button class="btn-outline" style="margin-top:10px;" onclick="toggleModal('esercizioModal')">Chiudi</button>
</div></div>

<div id="settingsModal" class="modal"><div class="modal-content">
    <h3>👥 Condomini</h3>
    <input type="text" id="c-nome" placeholder="Nome">
    <input type="number" id="c-mill" placeholder="Millesimi">
    <button class="btn-main" onclick="addCondomino()">Aggiungi</button>
    <div id="tab-nomi" style="margin-top:15px; max-height:200px; overflow-y:auto;"></div>
    <button class="btn-outline" style="margin-top:10px;" onclick="toggleModal('settingsModal')">Chiudi</button>
</div></div>

<div id="fullRegModal" class="modal"><div class="modal-content" style="max-width:90%; height:80vh; overflow-y:auto;">
    <h3>🔍 Registro Movimenti Correnti</h3>
    <div id="full-registry-body"></div>
    <button class="btn-main" style="margin-top:20px;" onclick="toggleModal('fullRegModal')">Chiudi</button>
</div></div>

<div id="archiveModal" class="modal"><div class="modal-content">
    <h3>📜 Archivio Storico</h3>
    <div id="archiveList"></div>
    <button class="btn-outline" style="margin-top:20px;" onclick="toggleModal('archiveModal')">Chiudi</button>
</div></div>

<script>
    let db = JSON.parse(localStorage.getItem('condoElite_v47')) || { 
        anno: 2024, condomini: [], spese: [], versamenti: [], archivio: [] 
    };

    document.getElementById('s-data').valueAsDate = new Date();

    function save() { localStorage.setItem('condoElite_v47', JSON.stringify(db)); updateUI(); }

    function toggleDropdown() {
        const m = document.getElementById('settingsMenu');
        m.style.display = m.style.display === 'block' ? 'none' : 'block';
    }

    function toggleModal(id) {
        const m = document.getElementById(id);
        m.style.display = m.style.display === 'block' ? 'none' : 'block';
        if(id === 'fullRegModal') renderRegistry();
        document.getElementById('settingsMenu').style.display = 'none';
    }

    function cambiaAnno() {
        db.anno = parseInt(document.getElementById('input-anno').value);
        toggleModal('esercizioModal');
        save();
    }

    function addCondomino() {
        const n = document.getElementById('c-nome'), m = document.getElementById('c-mill');
        if(n.value && m.value) { db.condomini.push({nome: n.value, mill: parseFloat(m.value)}); n.value=''; m.value=''; save(); }
    }

    function addSpesa() {
        const d = document.getElementById('s-desc'), i = document.getElementById('s-imp'), dt = document.getElementById('s-data');
        if(d.value && i.value > 0) {
            db.spese.push({desc: d.value.toUpperCase(), imp: parseFloat(i.value), data: new Date(dt.value).toLocaleDateString('it-IT'), rawDate: dt.value, annoRiferimento: db.anno});
            d.value=''; i.value=''; save();
        }
    }

    function addVersamento() {
        const id = document.getElementById('v-condomino'), imp = document.getElementById('v-imp'), cau = document.getElementById('v-causale');
        if(id.value !== '' && imp.value > 0) {
            db.versamenti.push({condominoId: id.value, nome: db.condomini[id.value].nome, imp: parseFloat(imp.value), causale: cau.value, data: new Date().toLocaleDateString('it-IT'), rawDate: new Date().toISOString(), annoRiferimento: db.anno});
            imp.value=''; save();
        }
    }

    function updateUI() {
        document.getElementById('header-anno').innerText = db.anno;
        document.getElementById('input-anno').value = db.anno;
        
        const totS = db.spese.reduce((a,b)=>a+b.imp, 0);
        const totF = db.versamenti.filter(v=>v.causale==="Fondo Cassa").reduce((a,b)=>a+b.imp, 0);
        const totV = db.versamenti.reduce((a,b)=>a+b.imp, 0);

        document.getElementById('val-tot-riparto-header').innerText = totS.toFixed(2) + " €";
        document.getElementById('val-fondo-auto-header').innerText = totF.toFixed(2) + " €";
        document.getElementById('val-liquidita').innerText = (totV-totS).toFixed(2) + " €";

        document.getElementById('v-condomino').innerHTML = '<option value="">Scegli...</option>' + 
            db.condomini.map((c,i)=>`<option value="${i}">${c.nome}</option>`).join('');

        document.getElementById('tab-main').innerHTML = db.condomini.map((c,idx)=>{
            const q = (totS * c.mill)/1000;
            const vR = db.versamenti.filter(x=>parseInt(x.condominoId)===idx && x.causale==="Rata Condominiale").reduce((a,b)=>a+b.imp,0);
            return `<tr><td><b>${c.nome}</b><br><small>${c.mill} mill.</small></td><td>${q.toFixed(2)}€</td><td>${vR.toFixed(2)}€</td><td style="color:${vR-q>=0?'green':'red'}"><b>${(vR-q).toFixed(2)}€</b></td></tr>`;
        }).join('');

        document.getElementById('tab-nomi').innerHTML = db.condomini.map((c,i)=>`
            <div style="display:flex; justify-content:space-between; margin-bottom:5px; background:#f8fafc; padding:8px; border-radius:8px;">
                <span>${c.nome} (${c.mill})</span> <button onclick="elimina('condomini',${i})" style="border:none; background:none;">🗑️</button>
            </div>
        `).join('');

        document.getElementById('archiveList').innerHTML = db.archivio.map((a,i)=>`
            <div style="padding:10px; border-bottom:1px solid #eee; display:flex; justify-content:space-between;">
                <span>Esercizio ${a.anno}</span> <button onclick="generaBilancioPDFCompleto(db.archivio[${i}].snapshot)">Scarica PDF</button>
            </div>
        `).join('');
    }

    function renderRegistry() {
        const container = document.getElementById('full-registry-body');
        let all = [...db.spese.map(s=>({...s, t:'USCITA'})), ...db.versamenti.map(v=>({...v, t:'ENTRATA'}))];
        all.sort((a,b)=> new Date(b.rawDate) - new Date(a.rawDate));
        container.innerHTML = all.length === 0 ? "Nessun movimento." : all.map((m,i)=>`
            <div style="font-size:0.8rem; padding:10px; border-bottom:1px solid #eee; display:flex; justify-content:space-between;">
                <span>${m.data} - ${m.t === 'USCITA' ? m.desc : m.nome} (${m.t})</span>
                <span style="color:${m.t==='ENTRATA'?'green':'red'}"><b>${m.imp.toFixed(2)}€</b></span>
                <button onclick="elimina('${m.t === 'USCITA' ? 'spese' : 'versamenti'}', ${m.origIdx})" style="border:none; background:none;">🗑️</button>
            </div>
        `).join('');
    }

    function elimina(t, i) { if(confirm("Eliminare voce?")) { db[t].splice(i,1); save(); renderRegistry(); } }

    function generaBilancioPDFCompleto(data) {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        const totSpese = data.spese.reduce((a, b) => a + b.imp, 0);
        
        // 1. INTESTAZIONE
        doc.setFont("helvetica", "bold");
        doc.setFontSize(18);
        doc.text(`RENDICONTO CONDOMINIALE - ANNO ${data.anno}`, 14, 20);
        doc.setFontSize(10);
        doc.setFont("helvetica", "normal");
        doc.text(`Data generazione: ${new Date().toLocaleDateString()}`, 14, 28);
        
        // 2. TABELLA ELENCO SPESE (DETTAGLIO)
        doc.setFontSize(12);
        doc.setFont("helvetica", "bold");
        doc.text("1. ELENCO ANALITICO DELLE SPESE", 14, 40);
        
        const righeSpese = data.spese.map(s => [s.data, s.desc, s.imp.toFixed(2) + " €"]);
        doc.autoTable({
            startY: 45,
            head: [['Data', 'Descrizione Spesa', 'Importo']],
            body: righeSpese,
            foot: [['', 'TOTALE USCITE', totSpese.toFixed(2) + " €"]],
            theme: 'striped',
            headStyles: { fillColor: [100, 116, 139] }
        });

        // 3. TABELLA RIPARTO MILLESIMALE (DIVISIONE)
        doc.setFontSize(12);
        doc.setFont("helvetica", "bold");
        doc.text("2. RIPARTO QUOTE E SALDI INDIVIDUALI", 14, doc.lastAutoTable.finalY + 15);
        
        const righeRiparto = data.condomini.map((c, i) => {
            const quota = (totSpese * c.mill) / 1000;
            const versato = data.versamenti
                .filter(v => parseInt(v.condominoId) === i && v.causale === "Rata Condominiale")
                .reduce((a, b) => a + b.imp, 0);
            const saldo = versato - quota;
            return [c.nome, c.mill, quota.toFixed(2) + " €", versato.toFixed(2) + " €", saldo.toFixed(2) + " €"];
        });

        doc.autoTable({
            startY: doc.lastAutoTable.finalY + 20,
            head: [['Condomino', 'Mill.', 'Quota Dovuta', 'Versato', 'Saldo']],
            body: righeRiparto,
            theme: 'grid',
            headStyles: { fillColor: [37, 99, 235] },
            columnStyles: {
                4: { fontStyle: 'bold' } // Saldo in grassetto
            }
        });

        // 4. FONDO CASSA
        const totFondo = data.versamenti
            .filter(v => v.causale === "Fondo Cassa")
            .reduce((a, b) => a + b.imp, 0);
        
        doc.setFontSize(10);
        doc.text(`Fondo Cassa Accantonato: ${totFondo.toFixed(2)} €`, 14, doc.lastAutoTable.finalY + 10);

        doc.save(`Bilancio_Dettagliato_${data.anno}.pdf`);
    }

    function chiudiEsercizio() {
        if(!confirm("Archiviare l'esercizio e azzerare le spese?")) return;
        db.archivio.push({anno: db.anno, dataChiusura: new Date().toLocaleString(), snapshot: JSON.parse(JSON.stringify(db))});
        db.spese = [];
        db.versamenti = db.versamenti.filter(v => v.causale === "Fondo Cassa");
        db.anno++;
        toggleModal('esercizioModal');
        save();
    }

    function exportBackup() {
        const blob = new Blob([JSON.stringify(db)], {type:'application/json'});
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a'); a.href = url; a.download = 'backup_condo.json'; a.click();
    }

    updateUI();
</script>
</body>
</html>
