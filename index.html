<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>CondoManager Ultimate v5.9</title>
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>

    <style>
        :root { --p: #0f172a; --a: #2563eb; --s: #166534; --d: #b91c1c; --t: #1e293b; }
        * { box-sizing: border-box; }
        body { font-family: "Inter", sans-serif; background: #f1f5f9; color: var(--t); margin: 0; font-size: 14px; }
        header { background: var(--p); color: white; padding: 12px 16px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; }
        .container { max-width: 1200px; margin: 15px auto; padding: 0 15px; }
        .summary-bar { display: flex; gap: 12px; margin-bottom: 20px; }
        .summary-card { flex: 1; background: white; padding: 15px; border-radius: 10px; border: 1px solid #e2e8f0; }
        .summary-card b { font-size: 18px; display: block; margin-top: 5px; font-family: monospace; }
        .main-grid { display: grid; grid-template-columns: 320px 1fr; gap: 20px; }
        @media (max-width: 900px) { .main-grid { grid-template-columns: 1fr; } }
        .panel { background: white; border: 1px solid #e2e8f0; border-radius: 12px; overflow: hidden; }
        .panel-header { background: #f8fafc; padding: 12px 16px; border-bottom: 1px solid #e2e8f0; font-weight: 800; font-size: 12px; }
        .panel-body { padding: 18px; }
        input, select { width: 100%; padding: 12px; border: 1px solid #cbd5e1; border-radius: 8px; margin-bottom: 15px; font-size: 15px; }
        .btn { padding: 12px; border-radius: 8px; border: none; cursor: pointer; font-weight: 700; font-size: 13px; width: 100%; transition: 0.2s; }
        .btn-blue { background: var(--a); color: white; }
        .btn-gray { background: #f1f5f9; color: #475569; border: 1px solid #e2e8f0; }
        .btn-red { background: var(--d); color: white; }
        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; background: #f8fafc; padding: 12px; border-bottom: 2px solid #e2e8f0; font-size: 11px; }
        td { padding: 14px 12px; border-bottom: 1px solid #f1f5f9; font-size: 14px; }
        .modal { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.6); z-index:2000; padding:20px; align-items: center; justify-content: center; backdrop-filter: blur(5px); }
        .modal-content { background: white; width: 100%; max-width: 600px; border-radius: 15px; padding: 25px; max-height: 85vh; overflow-y: auto; }
        .action-icon { cursor: pointer; padding: 4px 8px; border-radius: 4px; font-size: 12px; font-weight: bold; }
    </style>
</head>
<body>

<header>
    <div style="font-weight: 900; font-size: 16px;">CONDOMANAGER <span style="font-weight: 300;">ULTIMATE</span></div>
    <div style="display:flex; gap:10px;">
        <button class="btn btn-gray" style="width:auto; background: #334155; color:white; border:none;" onclick="toggleModal('regModal')">MOVIMENTI</button>
        <button class="btn btn-gray" style="width:auto;" onclick="toggleModal('archiveModal')">ARCHIVIO</button>
        <button class="btn btn-gray" style="width:auto;" onclick="toggleModal('settingsModal')">⚙️</button>
    </div>
</header>

<div class="container">
    <div class="summary-bar">
        <div class="summary-card"><small>USCITE</small><b id="st-uscite">0,00 €</b></div>
        <div class="summary-card"><small>FONDO</small><b id="st-fondo" style="color:var(--s)">0,00 €</b></div>
        <div class="summary-card"><small>ANNO</small><b id="label-anno" onclick="toggleModal('modalEsercizio')" style="cursor:pointer; color:var(--a)">2024 ▾</b></div>
    </div>

    <div class="main-grid">
        <div class="panel">
            <div class="panel-header">NUOVO INSERIMENTO</div>
            <div class="panel-body">
                <label style="font-size:11px; font-weight:800;">DATA (GG/MM/AAAA)</label>
                <input type="text" id="f-data" placeholder="es. 15/05/2024">
                
                <input type="text" id="f-desc" placeholder="Descrizione spesa">
                <input type="number" id="f-imp" placeholder="Importo uscita €">
                <button class="btn btn-blue" onclick="salvaMovimento('USCITA')">Registra Spesa</button>
                
                <hr style="margin:20px 0; border:0; border-top:1px solid #e2e8f0;">
                
                <select id="f-condo"></select>
                <select id="f-cau">
                    <option value="Rata Condominiale">Rata Condominiale</option>
                    <option value="Fondo Cassa">Fondo Cassa</option>
                </select>
                <input type="number" id="f-vimp" placeholder="Importo versato €">
                <button class="btn btn-blue" style="background:var(--s);" onclick="salvaMovimento('ENTRATA')">Registra Pagamento</button>
            </div>
        </div>

        <div class="panel">
            <div class="panel-header" style="display:flex; justify-content:space-between; align-items:center;">
                SITUAZIONE MILLESIMALE
                <button class="btn btn-gray" style="width:auto; padding:5px 15px; font-size:11px;" onclick="stampaQuote()">ESPORTA QUOTE (PDF)</button>
            </div>
            <div style="overflow-x:auto;">
                <table>
                    <thead><tr><th>CONDOMINO</th><th>QUOTA</th><th>VERSATO</th><th>SALDO</th></tr></thead>
                    <tbody id="main-table-body"></tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<!-- MODALE REGISTRO MOVIMENTI IN ALTO -->
<div id="regModal" class="modal">
    <div class="modal-content" style="max-width: 700px;">
        <h3 style="margin-top:0">Registro Movimenti</h3>
        <div style="overflow-x:auto;">
            <table>
                <thead><tr><th>Data</th><th>Dettaglio</th><th>Importo</th><th>Azioni</th></tr></thead>
                <tbody id="reg-table-body"></tbody>
            </table>
        </div>
        <button class="btn btn-gray" style="margin-top:15px;" onclick="toggleModal('regModal')">Chiudi</button>
    </div>
</div>

<!-- MODALE ESERCIZIO -->
<div id="modalEsercizio" class="modal"><div class="modal-content">
    <h3>Esercizio</h3>
    <input type="number" id="input-edit-anno">
    <button class="btn btn-blue" onclick="aggiornaAnno()">Aggiorna Anno</button>
    <hr style="margin:20px 0;">
    <button class="btn btn-red" onclick="proceduraChiusura()">🔒 CHIUDI E GENERA BILANCIO</button>
    <button class="btn btn-gray" style="margin-top:10px;" onclick="toggleModal('modalEsercizio')">Annulla</button>
</div></div>

<!-- MODALE CONFIG -->
<div id="settingsModal" class="modal"><div class="modal-content">
    <h3>Condomini</h3>
    <div style="display:flex; gap:10px; margin-bottom:15px;"><input type="text" id="c-nome" placeholder="Nome"><input type="number" id="c-mill" placeholder="Mill."><button class="btn btn-blue" style="width:auto" onclick="salvaCondomino()">+</button></div>
    <div id="lista-condo"></div>
    <button class="btn btn-gray" style="margin-top:15px;" onclick="toggleModal('settingsModal')">Chiudi</button>
</div></div>

<div id="archiveModal" class="modal"><div class="modal-content">
    <h3>Storico</h3>
    <div id="lista-archivi"></div>
    <button class="btn btn-gray" style="margin-top:15px;" onclick="toggleModal('archiveModal')">Chiudi</button>
</div></div>

<script>
    const firebaseConfig = {
      apiKey: "AIzaSyBCHjSOjZmN6Fcj-Pju4AM5Yx2edIuDwJo",
      authDomain: "condomanager-86dac.firebaseapp.com",
      projectId: "condomanager-86dac",
      storageBucket: "condomanager-86dac.firebasestorage.app",
      messagingSenderId: "582217098715",
      appId: "1:582217098715:web:c18804916c776cb48e73fe"
    };

    firebase.initializeApp(firebaseConfig);
    const fs = firebase.firestore();
    let state = { anno: 2024, condomini: [], spese: [], versamenti: [] };

    function initApp() {
        fs.collection("gestione").doc("corrente").onSnapshot(doc => {
            if (doc.exists) { state = doc.data(); renderUI(); }
        });
        loadArchivio();
    }

    function renderUI() {
        document.getElementById('label-anno').innerText = state.anno + " ▾";
        document.getElementById('input-edit-anno').value = state.anno;
        const totS = state.spese.reduce((a,b) => a + Number(b.imp), 0);
        const totF = state.versamenti.filter(v => v.cau === "Fondo Cassa").reduce((a,b) => a + Number(b.imp), 0);
        const totV = state.versamenti.reduce((a,b) => a + Number(b.imp), 0);

        document.getElementById('st-uscite').innerText = totS.toFixed(2) + " €";
        document.getElementById('st-fondo').innerText = totF.toFixed(2) + " €";

        document.getElementById('f-condo').innerHTML = state.condomini.map((c, i) => `<option value="${i}">${c.nome}</option>`).join('');

        const tbody = document.getElementById('main-table-body');
        tbody.innerHTML = state.condomini.map((c, i) => {
            const q = (totS * c.mill) / 1000;
            const v = state.versamenti.filter(x => parseInt(x.id) === i && x.cau === "Rata Condominiale").reduce((a,b) => a + Number(b.imp), 0);
            return `<tr><td><b>${c.nome}</b></td><td>${q.toFixed(2)}€</td><td>${v.toFixed(2)}€</td><td style="color:${v-q>=0?'green':'red'}"><b>${(v-q).toFixed(2)}€</b></td></tr>`;
        }).join('');

        const regBody = document.getElementById('reg-table-body');
        let regHtml = "";
        state.spese.forEach((s, idx) => {
            regHtml += `<tr><td>${s.data}</td><td>${s.desc}</td><td style="color:red">-${s.imp}€</td><td><span onclick="delItem('SPESA', ${idx})" style="color:red; cursor:pointer;">Elimina</span></td></tr>`;
        });
        state.versamenti.forEach((v, idx) => {
            regHtml += `<tr><td>${v.data}</td><td>${state.condomini[v.id]?.nome}</td><td style="color:green">+${v.imp}€</td><td>
                <span onclick="ricevuta(${idx})" style="color:blue; cursor:pointer; margin-right:10px;">Ricevuta</span>
                <span onclick="delItem('VERS', ${idx})" style="color:red; cursor:pointer;">Elimina</span>
            </td></tr>`;
        });
        regBody.innerHTML = regHtml;

        document.getElementById('lista-condo').innerHTML = state.condomini.map((c, i) => `<div style="padding:10px; border-bottom:1px solid #eee;">${c.nome} <span onclick="delItem('CONDO', ${i})" style="float:right; color:red; cursor:pointer;">✕</span></div>`).join('');
    }

    async function salvaMovimento(t) {
        const d = document.getElementById('f-data').value;
        if(t === 'USCITA') {
            const desc = document.getElementById('f-desc').value, imp = parseFloat(document.getElementById('f-imp').value);
            if(!d || !desc || isNaN(imp)) return alert("Dati incompleti");
            state.spese.push({ desc, imp, data: d });
        } else {
            const id = document.getElementById('f-condo').value, imp = parseFloat(document.getElementById('f-vimp').value), cau = document.getElementById('f-cau').value;
            if(!d || id === "" || isNaN(imp)) return alert("Dati incompleti");
            state.versamenti.push({ id, imp, cau, data: d });
        }
        await fs.collection("gestione").doc("corrente").set(state);
        document.getElementById('f-desc').value = ""; document.getElementById('f-imp').value = ""; document.getElementById('f-vimp').value = "";
    }

    async function delItem(type, i) {
        if(!confirm("Confermi eliminazione?")) return;
        if(type === 'SPESA') state.spese.splice(i, 1);
        if(type === 'VERS') state.versamenti.splice(i, 1);
        if(type === 'CONDO') state.condomini.splice(i, 1);
        await fs.collection("gestione").doc("corrente").set(state);
    }

    async function proceduraChiusura() {
        if(!confirm("Chiudere l'anno? Verrà generato il PDF del bilancio.")) return;
        stampaBilancio(state); 
        await fs.collection("archivio").doc("anno_" + state.anno).set(state);
        const f = state.versamenti.filter(v => v.cau === "Fondo Cassa");
        state.anno++; state.spese = []; state.versamenti = f;
        await fs.collection("gestione").doc("corrente").set(state);
        toggleModal('modalEsercizio');
    }

    function stampaQuote() {
        const { jsPDF } = window.jspdf; const doc = new jsPDF();
        doc.text("QUOTE CONDOMINIALI", 14, 20);
        const totS = state.spese.reduce((a,b) => a + Number(b.imp), 0);
        doc.autoTable({ startY: 30, head: [['Condomino', 'Mill.', 'Quota €']], body: state.condomini.map(c => [c.nome, c.mill, ((totS * c.mill)/1000).toFixed(2)]) });
        doc.save("Quote.pdf");
    }

    function stampaBilancio(data) {
        const { jsPDF } = window.jspdf; const doc = new jsPDF();
        doc.text("BILANCIO ANNO " + data.anno, 14, 20);
        doc.autoTable({ startY: 30, head: [['Data', 'Uscita', '€']], body: data.spese.map(s => [s.data, s.desc, s.imp.toFixed(2)]) });
        doc.save(`Bilancio_${data.anno}.pdf`);
    }

    function ricevuta(i) {
        const v = state.versamenti[i]; const c = state.condomini[v.id];
        const { jsPDF } = window.jspdf; const doc = new jsPDF({ format: [100, 150] });
        doc.setFontSize(14); doc.text("RICEVUTA PAGAMENTO", 10, 20);
        doc.setFontSize(10); doc.text(`Data: ${v.data}\nCondomino: ${c.nome}\nCausale: ${v.cau}\n\nIMPORTO: ${v.imp.toFixed(2)} €`, 10, 40);
        doc.save(`Ricevuta_${c.nome}.pdf`);
    }

    async function salvaCondomino() {
        const n = document.getElementById('c-nome').value, m = parseFloat(document.getElementById('c-mill').value);
        if(n && !isNaN(m)) { state.condomini.push({nome:n, mill:m}); await fs.collection("gestione").doc("corrente").set(state); }
    }

    async function aggiornaAnno() { state.anno = parseInt(document.getElementById('input-edit-anno').value); await fs.collection("gestione").doc("corrente").set(state); toggleModal('modalEsercizio'); }
    function toggleModal(id) { const m = document.getElementById(id); m.style.display = (m.style.display === 'flex') ? 'none' : 'flex'; }
    function loadArchivio() { fs.collection("archivio").onSnapshot(snap => { document.getElementById('lista-archivi').innerHTML = snap.docs.map(doc => `<div style="padding:10px; border-bottom:1px solid #eee;">Anno ${doc.data().anno} <button onclick='stampaBilancio(${JSON.stringify(doc.data())})' style="float:right">PDF</button></div>`).join(''); }); }
    
    // Imposta data odierna nel formato GG/MM/AAAA
    const oggi = new Date();
    document.getElementById('f-data').value = oggi.toLocaleDateString('it-IT');
    initApp();
</script>
</body>
</html>
